<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyLock</title>
    <script type="module" crossorigin src="/assets/index-Cx8U_mbK.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BExCsNcp.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('load', () => {
        let youtubeFeatureAdded = false;
        
        function exactVideoId(url) {
          if (!url) return null;
          const ytMatch = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i);
          return ytMatch ? ytMatch[1] : null;
        }

        function createFullscreenOverlay(videoId) {
          const overlay = document.createElement('div');
          overlay.style.cssText = 'position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 2147483647; display: flex; flex-direction: column; justify-content: center; align-items: center;';
          
          const closeBtn = document.createElement('button');
          closeBtn.innerHTML = '✕ End Study Session';
          closeBtn.style.cssText = 'position: absolute; top: 20px; right: 20px; background: rgba(229, 45, 39, 0.9); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; z-index: 2147483648; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.5);';
          
          closeBtn.onclick = () => {
            if (document.fullscreenElement) document.exitFullscreen().catch(err => console.log(err));
            if (document.body.contains(overlay)) document.body.removeChild(overlay);
          };
          
          const iframe = document.createElement('iframe');
          let embedUrl = '';
          if (videoId.startsWith('?')) {
              // Search playlist mode
              embedUrl = 'https://www.youtube-nocookie.com/embed' + videoId + '&autoplay=1&fs=1&color=white&disablekb=1&modestbranding=1';
          } else {
              // Direct video ID mode
              embedUrl = 'https://www.youtube-nocookie.com/embed/' + videoId + '?autoplay=1&fs=1&color=white&disablekb=1&modestbranding=1';
          }
          iframe.src = embedUrl;
          iframe.style.cssText = 'width: 100%; height: 100%; border: none;';
          iframe.setAttribute('allowfullscreen', 'true');
          iframe.setAttribute('allow', 'autoplay; fullscreen; encrypted-media; picture-in-picture');
          
          overlay.appendChild(iframe);
          overlay.appendChild(closeBtn);
          document.body.appendChild(overlay);
          
          try {
            if (overlay.requestFullscreen) overlay.requestFullscreen();
            else if (overlay.webkitRequestFullscreen) overlay.webkitRequestFullscreen();
            else if (overlay.msRequestFullscreen) overlay.msRequestFullscreen();
          } catch (err) {
            console.error('Fullscreen failed', err);
          }
        }

        const observer = new MutationObserver(() => {
          const searchInput = document.querySelector('input[placeholder*="Search"]');
          
          let ytBtn = document.getElementById('yt-focus-fab');
          if (!ytBtn) {
            ytBtn = document.createElement('button');
            ytBtn.id = 'yt-focus-fab';
            ytBtn.innerHTML = '▶ Watch Video in Deep Focus';
            ytBtn.style.cssText = 'position: fixed; bottom: 30px; right: 30px; background: #7367F0; color: white; border: none; padding: 16px 32px; border-radius: 50px; font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.3s all; box-shadow: 0 10px 25px rgba(115, 103, 240, 0.5); border: 2px solid rgba(255,255,255,0.1); z-index: 999999; display: none;';
            
            ytBtn.onmouseenter = () => ytBtn.style.transform = 'translateY(-5px) scale(1.05)';
            ytBtn.onmouseleave = () => ytBtn.style.transform = 'translateY(0) scale(1)';
            
            ytBtn.onclick = (e) => {
              e.preventDefault();
              const currentInput = document.querySelector('input[placeholder*="Search"]');
              if (!currentInput) return;
              
              const query = currentInput.value.trim();
              if (!query) return alert("Please enter a topic or link in the search bar first!");

              const vidId = exactVideoId(query);
              
              ytBtn.innerHTML = '▶ Fetching Secure Study Video...';
              
              if (vidId) {
                const srcUrl = 'https://www.youtube-nocookie.com/embed/' + vidId + '?autoplay=1&fs=1&color=white&disablekb=1&modestbranding=1';
                createFullscreenOverlay(srcUrl);
                ytBtn.innerHTML = '▶ Watch Video in Deep Focus';
              } else {
                fetch('/api/search-video?q=' + encodeURIComponent(query))
                  .then(res => res.json())
                  .then(data => {
                      ytBtn.innerHTML = '▶ Watch Video in Deep Focus';
                      if (data.videoId) {
                          const srcUrl = 'https://www.youtube-nocookie.com/embed/' + data.videoId + '?autoplay=1&fs=1&color=white&disablekb=1&modestbranding=1';
                          createFullscreenOverlay(srcUrl);
                      } else {
                          alert("Could not find a valid study video for that topic. Please paste a direct YouTube URL instead.");
                      }
                  })
                  .catch(err => {
                      ytBtn.innerHTML = '▶ Watch Video in Deep Focus';
                      alert("Topic search proxy failed. Please use a direct YouTube URL.");
                  });
              }
            };
            document.body.appendChild(ytBtn);
          }
          
          // Only show button if search is actually on screen (we are inside the portal dashboard)
          if (searchInput) {
            ytBtn.style.display = 'block';
            
            // Allow user to just hit Enter in the input bar
            if (!searchInput.dataset.ytBound) {
                searchInput.dataset.ytBound = "true";
                searchInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        ytBtn.click();
                    }
                });
            }
          } else {
            ytBtn.style.display = 'none';
          }
        });
        
        observer.observe(document.body, { childList: true, subtree: true });
        
      });
    </script>
  </body>
</html>
